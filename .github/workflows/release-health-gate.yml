name: Release Health Gate

# Auto-rollback gate. Triggered by deploy-lambda.yml after a prod deploy.
# Sleeps 30 minutes, then evaluates CloudWatch signals for the post-deploy
# window and rolls back the API Lambda alias if the release looks unhealthy.
#
# Signals (see .kiro/specs/release-quality-and-ops-hygiene, R2):
#   - RUM_Signal: for each of the four CloudWatch RUM app monitors (web,
#     business, staff, admin) the frontend JS error rate (JsErrorCount /
#     SessionCount) for the post-deploy window vs the trailing 7-day baseline.
#     RUM has no release/SHA concept, so the "release" is the deploy timestamp
#     window, not a release tag.
#   - Backend_Signal: the prod API Lambda error and p99 CloudWatch alarms; any
#     alarm in ALARM during the window is a rollback vote.
#
# The decision rule is the pure function in scripts/health-gate-decision.mjs
# (property-tested; see the spec's Property 2). Missing or unreadable data is a
# distinct, loud job failure, never a silent pass (R2.4).
#
# See .kiro/specs/churn-defences/ Requirement 5 for the original rationale and
# §1.5 of docs/CHURN_DEFENSES.md (Starbucks app outages and crashes).

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA of the release to monitor'
        required: true
        type: string
      dryRun:
        description: 'Run the decision logic without rolling back'
        required: false
        default: false
        type: boolean
      waitMinutes:
        description: 'Minutes to wait before evaluating health (default 30)'
        required: false
        default: '30'
        type: string
      minSessions:
        description: 'Minimum per-monitor sessions before a frontend regression can vote (default 30). Prevents low-traffic false positives.'
        required: false
        default: '30'
        type: string

permissions:
  id-token: write
  contents: read

env:
  # Prod RUM app monitor names, one per SPA. These are the
  # AWS/RUM `application_name` dimension values (module.rum in
  # infra/environments/prod/main.tf creates area-code-prod-<key>).
  RUM_MONITORS: 'web business staff admin'
  RUM_PREFIX: 'area-code-prod-'
  # Prod API Lambda alarms (Backend_Signal).
  BACKEND_ALARMS: 'area-code-prod-api-errors area-code-prod-api-duration-p99'
  # Absolute increase in error rate (window minus baseline) that counts as a
  # frontend regression.
  ERROR_RATE_REGRESSION_THRESHOLD: '0.05'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Wait for traffic to accumulate
        run: |
          MINUTES=${{ inputs.waitMinutes }}
          echo "Waiting $MINUTES minutes for release health to stabilise..."
          sleep $((MINUTES * 60))

      - name: Collect CloudWatch signals
        id: collect
        env:
          WAIT_MINUTES: ${{ inputs.waitMinutes }}
        run: |
          set -euo pipefail

          # Post-deploy window = the last WAIT_MINUTES; baseline = trailing 7d.
          NOW=$(date -u +%s)
          WINDOW_START=$(date -u -d "@$((NOW - WAIT_MINUTES * 60))" +%Y-%m-%dT%H:%M:%SZ)
          BASELINE_START=$(date -u -d "@$((NOW - 7 * 24 * 3600))" +%Y-%m-%dT%H:%M:%SZ)
          END=$(date -u -d "@${NOW}" +%Y-%m-%dT%H:%M:%SZ)

          MISSING=false

          # Sum a single AWS/RUM metric over a time range for one monitor.
          # Prints the numeric sum, or the literal MISSING on any API failure.
          rum_sum() {
            local metric="$1" monitor="$2" start="$3" end="$4" period="$5"
            local out
            if ! out=$(aws cloudwatch get-metric-statistics \
              --namespace AWS/RUM \
              --metric-name "$metric" \
              --dimensions "Name=application_name,Value=${RUM_PREFIX}${monitor}" \
              --start-time "$start" --end-time "$end" \
              --period "$period" --statistics Sum \
              --query 'Datapoints[].Sum' --output json 2>/dev/null); then
              echo "MISSING"
              return
            fi
            # Empty datapoint set for an error count is a legitimate zero; the
            # empty-metric-set guard in the decision function keys off sessions.
            echo "$out" | jq -r 'if type=="array" then (add // 0) else 0 end'
          }

          SIGNALS='[]'
          for m in $RUM_MONITORS; do
            WIN_ERR=$(rum_sum JsErrorCount "$m" "$WINDOW_START" "$END" 300)
            WIN_SESS=$(rum_sum SessionCount "$m" "$WINDOW_START" "$END" 300)
            BASE_ERR=$(rum_sum JsErrorCount "$m" "$BASELINE_START" "$END" 86400)
            BASE_SESS=$(rum_sum SessionCount "$m" "$BASELINE_START" "$END" 86400)

            if [ "$WIN_ERR" = MISSING ] || [ "$WIN_SESS" = MISSING ] || \
               [ "$BASE_ERR" = MISSING ] || [ "$BASE_SESS" = MISSING ]; then
              MISSING=true
              WIN_ERR=0; WIN_SESS=0; BASE_ERR=0; BASE_SESS=0
            fi

            SIGNALS=$(jq -c \
              --arg monitor "$m" \
              --argjson winErr "$WIN_ERR" --argjson winSess "$WIN_SESS" \
              --argjson baseErr "$BASE_ERR" --argjson baseSess "$BASE_SESS" \
              '. + [{
                monitor: $monitor,
                windowErrorRate: (if $winSess > 0 then ($winErr / $winSess) else 0 end),
                baselineErrorRate: (if $baseSess > 0 then ($baseErr / $baseSess) else 0 end),
                windowSessions: $winSess
              }]' <<<"$SIGNALS")
          done

          # Backend_Signal: current state of each prod API Lambda alarm.
          ALARMS='[]'
          for a in $BACKEND_ALARMS; do
            if ! STATE=$(aws cloudwatch describe-alarms \
              --alarm-names "$a" \
              --query 'MetricAlarms[0].StateValue' --output text 2>/dev/null); then
              MISSING=true
              STATE="INSUFFICIENT_DATA"
            fi
            if [ -z "$STATE" ] || [ "$STATE" = "None" ]; then
              MISSING=true
              STATE="INSUFFICIENT_DATA"
            fi
            ALARMS=$(jq -c --arg name "$a" --arg state "$STATE" \
              '. + [{name: $name, state: $state}]' <<<"$ALARMS")
          done

          PAYLOAD=$(jq -c -n \
            --argjson frontendSignals "$SIGNALS" \
            --argjson backendAlarms "$ALARMS" \
            --argjson hasMissingData "$MISSING" \
            --argjson threshold "${ERROR_RATE_REGRESSION_THRESHOLD}" \
            --argjson minSessions "${{ inputs.minSessions }}" \
            '{
              frontendSignals: $frontendSignals,
              backendAlarms: $backendAlarms,
              hasMissingData: $hasMissingData,
              errorRateRegressionThreshold: $threshold,
              minSessions: $minSessions
            }')

          echo "$PAYLOAD" > signals.json
          echo "payload<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Collected signals:"
          jq . signals.json

      - name: Evaluate decision
        id: health
        run: |
          set -euo pipefail
          # The decision core exits non-zero on MISSING_DATA, so a missing or
          # unreadable signal fails this step loudly (no rollback decision,
          # never a silent pass — R2.4).
          if RESULT=$(node scripts/health-gate-decision.mjs signals.json); then
            GATE_FAILED=false
          else
            GATE_FAILED=true
          fi
          echo "Decision: $RESULT"
          DECISION=$(echo "$RESULT" | jq -r '.decision')
          REASONS=$(echo "$RESULT" | jq -r '.reasons | join(", ")')
          echo "decision=$DECISION" | tee -a "$GITHUB_OUTPUT"
          echo "reasons=$REASONS" | tee -a "$GITHUB_OUTPUT"
          if [ "$DECISION" = "ROLLBACK" ]; then
            echo "rollback=true" | tee -a "$GITHUB_OUTPUT"
          else
            echo "rollback=false" | tee -a "$GITHUB_OUTPUT"
          fi
          if [ "$GATE_FAILED" = "true" ]; then
            echo "::error::Health gate could not read the CloudWatch signal ($REASONS). Failing loudly; no rollback decision made. Investigate RUM/alarm data before trusting this deploy."
            exit 1
          fi

      - name: Auto-rollback (alias swap)
        id: rollback
        if: ${{ steps.health.outputs.rollback == 'true' && inputs.dryRun != 'true' }}
        run: |
          set -e
          FN="area-code-prod-api"
          PREV_VERSION=$(aws lambda get-alias --function-name "$FN" --name live-prev --query FunctionVersion --output text 2>/dev/null || echo "")
          if [ -z "$PREV_VERSION" ] || [ "$PREV_VERSION" = "None" ]; then
            echo "::error::No live-prev alias found — cannot auto-rollback. Manual intervention required."
            exit 1
          fi
          aws lambda update-alias --function-name "$FN" --name live --function-version "$PREV_VERSION"
          echo "rolled_back_to=$PREV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Slack alert
        if: ${{ steps.health.outputs.rollback == 'true' && env.SLACK_OPS_WEBHOOK != '' }}
        env:
          SLACK_OPS_WEBHOOK: ${{ secrets.SLACK_OPS_WEBHOOK }}
        run: |
          PAYLOAD=$(jq -n \
            --arg sha "${{ inputs.sha }}" \
            --arg decision "${{ steps.health.outputs.decision }}" \
            --arg reasons "${{ steps.health.outputs.reasons }}" \
            --arg dryRun "${{ inputs.dryRun }}" \
            --arg version "${{ steps.rollback.outputs.rolled_back_to }}" \
            '{text: ("Release health gate fired for " + $sha + ". decision=" + $decision + " reasons=" + $reasons + " dryRun=" + $dryRun + " rolled-back-to=" + $version)}')
          curl -sS -X POST -H 'Content-Type: application/json' --data "$PAYLOAD" "$SLACK_OPS_WEBHOOK"

      - name: Tag rolled-back commit
        if: ${{ steps.health.outputs.rollback == 'true' && inputs.dryRun != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date +%Y%m%d%H%M)
          git config user.name "release-health-gate"
          git config user.email "ops@areacode.co.za"
          git tag -a "rollback-$TS" "${{ inputs.sha }}" -m "Auto-rollback by release-health-gate"
          git push origin "rollback-$TS"

      - name: Summary
        if: ${{ always() }}
        run: |
          echo "## Release Health Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | \`${{ inputs.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Wait window (min) | ${{ inputs.waitMinutes }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Min sessions (per monitor) | ${{ inputs.minSessions }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Decision | ${{ steps.health.outputs.decision }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reasons | ${{ steps.health.outputs.reasons }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback | ${{ steps.health.outputs.rollback }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ inputs.dryRun }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Collected signals</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat signals.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo '(signals not collected)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
