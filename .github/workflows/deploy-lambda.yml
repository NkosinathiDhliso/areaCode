name: Deploy Lambda
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod
      skip_terraform:
        description: 'Skip terraform apply (deploy Lambda code only)'
        required: false
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Build and deploy
        id: deploy
        env:
          SKIP_BUILD: 'false'
          SKIP_TERRAFORM: ${{ github.event.inputs.skip_terraform }}
        run: ./scripts/deploy-serverless.sh us-east-1 ${{ github.event.inputs.environment }}

      # Capture the Lambda version we just promoted to `live` and the version
      # it replaced so the release-health gate can roll back if needed.
      - name: Ensure live-prev alias + capture Lambda alias versions
        id: alias-versions
        if: ${{ github.event.inputs.environment == 'prod' }}
        run: |
          set -e
          FN="area-code-${{ github.event.inputs.environment }}-api"
          CURRENT_VERSION=$(aws lambda get-alias --function-name "$FN" --name live --query FunctionVersion --output text)

          # Idempotent bootstrap: create live-prev pointing at the current
          # version on first deploy. Subsequent deploys preserve the pointer
          # to whatever version was live before this deploy.
          if ! aws lambda get-alias --function-name "$FN" --name live-prev >/dev/null 2>&1; then
            aws lambda create-alias \
              --function-name "$FN" \
              --name live-prev \
              --function-version "$CURRENT_VERSION" \
              --description "Set automatically by deploy-lambda.yml for release-health-gate rollback" >/dev/null
            echo "Bootstrapped live-prev → $CURRENT_VERSION"
            PREV_VERSION="$CURRENT_VERSION"
          else
            PREV_VERSION=$(aws lambda get-alias --function-name "$FN" --name live-prev --query FunctionVersion --output text)
          fi

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "function=$FN" >> "$GITHUB_OUTPUT"

  trigger-health-gate:
    needs: deploy
    if: ${{ github.event.inputs.environment == 'prod' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger release-health gate
        run: gh workflow run release-health-gate.yml -f sha=${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
