name: Rollback Production
on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to rollback'
        required: true
        type: choice
        options:
          - backend
          - web
          - business
          - admin
          - staff
      revision:
        description: 'Previous task definition revision (for backend) or git SHA (for frontend)'
        required: true
        type: string

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.service }}
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Rollback Backend
        if: github.event.inputs.service == 'backend'
        uses: aws-actions/aws-cli@v2
        with:
          args: ecs update-service --cluster area-code-prod --service area-code-backend --task-definition area-code-backend:${{ github.event.inputs.revision }} --region af-south-1

      - name: Rollback Frontend (Amplify)
        if: github.event.inputs.service != 'backend'
        run: |
          echo "Rolling back Amplify app ${{ github.event.inputs.service }} to commit ${{ github.event.inputs.revision }}"
          # Requires AWS CLI configured for Amplify
          aws amplify start-deployment --app-id ${{ secrets.AMPLIFY_APP_ID }} --branch-name main --source-url s3://area-code-releases/${{ github.event.inputs.revision }}.zip
