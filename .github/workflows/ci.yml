name: CI Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  data-integrity:
    name: Data Integrity Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run data integrity checks
        run: pnpm exec vitest run --reporter=verbose backend/src/__tests__/data-integrity.test.ts

  schema-validation:
    name: Prisma Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate Prisma schema
        run: pnpm exec prisma validate
        working-directory: backend
      - name: Check for pending migrations
        run: pnpm exec prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --exit-code
        working-directory: backend

  build-lambdas:
    name: Build Lambda Functions
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, test, data-integrity]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all Lambda functions
        run: make build-all
      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-bundles
          path: dist/*.zip
          retention-days: 7

  build-ecs-image:
    name: Build ECS Docker Image
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, test, data-integrity]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and tag Docker image
        working-directory: backend
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -t area-code-api:${IMAGE_TAG} .
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

  build-frontends:
    name: Build Frontends
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, test]
    strategy:
      matrix:
        app: [web, admin, business, staff]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build ${{ matrix.app }}
        run: pnpm exec vite build
        working-directory: apps/${{ matrix.app }}
        env:
          VITE_DEV_MOCK: "false"

  # ── Deploy to Dev ──────────────────────────────────────────────────────────

  deploy-dev:
    name: Deploy to Dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [build-lambdas, build-ecs-image, build-frontends, schema-validation]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Run DB migrations via Lambda
      - name: Run Prisma migrations (dev)
        run: |
          aws lambda invoke \
            --function-name area-code-dev-run-migration \
            --payload '{}' \
            /tmp/migration-output.json
          cat /tmp/migration-output.json

      # 2. Deploy Lambda functions
      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-bundles
          path: dist/
      - name: Deploy Lambdas to dev
        run: make deploy-all ENV=dev

      # 3. Build + push ECS image
      - name: Push ECS image to dev
        working-directory: backend
        run: |
          ECR_REPO="${{ steps.ecr-login.outputs.registry }}/area-code-dev-api"
          IMAGE_TAG="${{ github.sha }}"
          docker build -t ${ECR_REPO}:${IMAGE_TAG} .
          docker push ${ECR_REPO}:${IMAGE_TAG}
          aws ecs update-service \
            --cluster area-code-dev \
            --service area-code-dev-api \
            --force-new-deployment

  # ── Deploy to Prod ─────────────────────────────────────────────────────────

  deploy-prod:
    name: Deploy to Prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Run DB migrations via Lambda
      - name: Run Prisma migrations (prod)
        run: |
          aws lambda invoke \
            --function-name area-code-prod-run-migration \
            --payload '{}' \
            /tmp/migration-output.json
          cat /tmp/migration-output.json

      # 2. Deploy Lambda functions
      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-bundles
          path: dist/
      - name: Deploy Lambdas to prod
        run: make deploy-all ENV=prod

      # 3. Build + push ECS image
      - name: Push ECS image to prod
        working-directory: backend
        run: |
          ECR_REPO="${{ steps.ecr-login.outputs.registry }}/area-code-prod-api"
          IMAGE_TAG="${{ github.sha }}"
          docker build -t ${ECR_REPO}:${IMAGE_TAG} .
          docker push ${ECR_REPO}:${IMAGE_TAG}
          aws ecs update-service \
            --cluster area-code-prod \
            --service area-code-prod-api \
            --force-new-deployment

      # 4. Smoke test
      - name: Smoke test prod API
        run: |
          sleep 30
          HEALTH=$(curl -sf https://api.areacode.co.za/health || echo '{"status":"failed"}')
          echo "Health check: ${HEALTH}"
          echo "${HEALTH}" | grep -q '"status":"ok"'
