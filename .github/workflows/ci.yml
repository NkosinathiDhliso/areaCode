name: CI Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      # Warning_Ratchet: same cap as quality-gate.yml (post-cleanup count) so
      # master cannot drift above what PRs are held to. Only ever lower this
      # number as the count drops; never raise it.
      - run: pnpm exec eslint . --max-warnings 173

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  data-integrity:
    name: Data Integrity Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run data integrity checks
        run: pnpm exec vitest run --reporter=verbose backend/src/__tests__/data-integrity.test.ts

  serverless-guard:
    name: Serverless-Only Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run serverless guard
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File scripts/assert-serverless-only.ps1

  # Supply-chain gate (R6.1): runs on every push to master (and on PRs) and
  # fails on any high or critical advisory that is not an accepted risk. It
  # lives here, not in quality-gate.yml, because quality-gate.yml is PR-only and
  # the requirement is "on every push to master"; this workflow has the push
  # trigger. Accepted risks are the committed auditConfig.ignoreGhsas list in
  # pnpm-workspace.yaml, one entry per advisory with a justification comment.
  # pnpm audit honours that list natively, so the ignore mechanism is the single
  # source of truth. build-lambdas depends on this job, so a new high or
  # critical vulnerability blocks deploy.
  dependency-audit:
    name: Dependency Audit (high/critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # pnpm audit reads pnpm-lock.yaml and the auditConfig ignore list from
      # pnpm-workspace.yaml; it does not need node_modules, so no install step.
      - name: Dependency audit
        run: pnpm audit --audit-level high

  # Parity locks (R4.4 / R6.4): the closure scripts are the regression tests for
  # Table_Closure and Amplify_Env_Closure. quality-gate.yml runs them on PRs;
  # this job mirrors them on push to master (same rationale as the lint cap) so
  # master cannot drift a new table or VITE key past closure. Static parsers
  # that only read repo files (node builtins, zero deps), so no pnpm install.
  # build-lambdas depends on this job, so an unclosed gap blocks deploy.
  closure-locks:
    name: Parity Closure Locks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Table closure lock
        run: node scripts/check-table-closure.mjs
      - name: Amplify env closure lock
        run: node scripts/check-amplify-env-closure.mjs

  build-lambdas:
    name: Build Lambda Functions
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, test, data-integrity, serverless-guard, dependency-audit, closure-locks]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Lambda bundles (monolith + websocket + workers)
        run: pnpm --filter backend build:lambda
      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-bundles
          path: |
            backend/dist/lambda/index.mjs
            backend/dist/websocket/index.mjs
            backend/dist/workers/**/index.mjs
          retention-days: 7

  build-frontends:
    name: Build Frontends
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, test]
    strategy:
      matrix:
        # Mobile exclusion decision (R6.3): apps/mobile (Expo React Native) is
        # intentionally excluded from CI. Mobile CI enablement is deferred, not
        # forgotten; the app builds through Expo, not vite build, so it needs a
        # separate pipeline. See the C1 Mobile app finding and deferral note in
        # docs/PLATFORM_AUDIT_FINDINGS.md. Add a mobile leg here when that work
        # is picked up.
        app: [web, admin, business, staff]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build ${{ matrix.app }}
        run: pnpm exec vite build
        working-directory: apps/${{ matrix.app }}
        env:
          VITE_DEV_MOCK: 'false'
      # Bundle_Budget (R9.3): enforce the consumer web initial-gzip ceiling
      # right after its build, per the design ("vite-bundle measurement in CI
      # after pnpm --filter @area-code/web build"). Web only; the budget and the
      # initial-vs-lazy chunk logic live in scripts/check-bundle-budget.mjs.
      - name: Check consumer web bundle budget
        if: matrix.app == 'web'
        run: node scripts/check-bundle-budget.mjs

  # ── Deploy to Dev ──────────────────────────────────────────────────────────

  deploy-dev:
    name: Deploy to Dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [build-lambdas, build-frontends, serverless-guard]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-bundles
          path: backend/dist/

      - name: Deploy Lambdas to dev
        run: ./scripts/deploy-serverless.sh us-east-1 dev
        env:
          SKIP_BUILD: 'true'
          SKIP_TERRAFORM: 'true'

  # ── Deploy to Prod ─────────────────────────────────────────────────────────

  deploy-prod:
    name: Deploy to Prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-bundles
          path: backend/dist/

      - name: Deploy Lambdas to prod
        run: ./scripts/deploy-serverless.sh us-east-1 prod
        env:
          SKIP_BUILD: 'true'
          SKIP_TERRAFORM: 'true'

      - name: Smoke test prod API
        run: |
          sleep 30
          HEALTH=$(curl -sf https://api.areacode.co.za/health || echo '{"status":"failed"}')
          echo "Health check: ${HEALTH}"
          echo "${HEALTH}" | grep -q '"status":"ok"'
          NODES_STATUS=$(curl -s -o /tmp/nodes.json -w "%{http_code}" https://api.areacode.co.za/v1/nodes/johannesburg)
          echo "Nodes endpoint status: ${NODES_STATUS}"
          test "${NODES_STATUS}" = "200"
