name: CI Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  data-integrity:
    name: Data Integrity Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run data integrity checks
        run: pnpm exec vitest run --reporter=verbose backend/src/__tests__/data-integrity.test.ts

  serverless-guard:
    name: Serverless-Only Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run serverless guard
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File scripts/assert-serverless-only.ps1

  build-lambdas:
    name: Build Lambda Functions
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, test, data-integrity, serverless-guard]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Lambda bundles (monolith + websocket + workers)
        run: pnpm --filter backend build:lambda
      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-bundles
          path: |
            backend/dist/lambda/index.mjs
            backend/dist/websocket/index.mjs
            backend/dist/workers/**/index.mjs
          retention-days: 7

  build-frontends:
    name: Build Frontends
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, test]
    strategy:
      matrix:
        app: [web, admin, business, staff]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build ${{ matrix.app }}
        run: pnpm exec vite build
        working-directory: apps/${{ matrix.app }}
        env:
          VITE_DEV_MOCK: 'false'

  # ── Deploy to Dev ──────────────────────────────────────────────────────────

  deploy-dev:
    name: Deploy to Dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [build-lambdas, build-frontends, serverless-guard]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-bundles
          path: backend/dist/

      - name: Deploy Lambdas to dev
        run: ./scripts/deploy-serverless.sh us-east-1 dev
        env:
          SKIP_BUILD: 'true'
          SKIP_TERRAFORM: 'true'

  # ── Deploy to Prod ─────────────────────────────────────────────────────────

  deploy-prod:
    name: Deploy to Prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-bundles
          path: backend/dist/

      - name: Deploy Lambdas to prod
        run: ./scripts/deploy-serverless.sh us-east-1 prod
        env:
          SKIP_BUILD: 'true'
          SKIP_TERRAFORM: 'true'

      - name: Smoke test prod API
        run: |
          sleep 30
          HEALTH=$(curl -sf https://api.areacode.co.za/health || echo '{"status":"failed"}')
          echo "Health check: ${HEALTH}"
          echo "${HEALTH}" | grep -q '"status":"ok"'
          NODES_STATUS=$(curl -s -o /tmp/nodes.json -w "%{http_code}" https://api.areacode.co.za/v1/nodes/johannesburg)
          echo "Nodes endpoint status: ${NODES_STATUS}"
          test "${NODES_STATUS}" = "200"

      # Notify Sentry of new release (only runs if token is configured)
      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: area-code-api
        run: |
          npx @sentry/cli releases new "area-code-api@${{ github.sha }}"
          npx @sentry/cli releases set-commits "area-code-api@${{ github.sha }}" --auto
          npx @sentry/cli releases finalize "area-code-api@${{ github.sha }}"
          npx @sentry/cli releases deploys "area-code-api@${{ github.sha }}" new -e prod
