version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Pin pnpm to v9 to match CI and avoid pnpm 10's stricter
        # ERR_PNPM_IGNORED_BUILDS behavior that was failing builds.
        - npm install -g pnpm@9
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @area-code/web build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    # Hashed Vite build artifacts — safe to cache forever.
    - pattern: '/assets/**'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    # HTML entry and service worker must never be cached, otherwise
    # tabs end up referencing chunk hashes from a previous deploy.
    - pattern: '/index.html'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'
    - pattern: '/'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'
    - pattern: '/sw.js'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'
    - pattern: '**/*'
      headers:
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'

customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|xml|svg|woff|woff2|ttf|map|json|webmanifest|webp|avif)$)([^.]+$)/>'
    target: /index.html
    status: '200'
