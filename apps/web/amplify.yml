version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Pin pnpm to v9 to match CI and avoid pnpm 10's stricter
        # ERR_PNPM_IGNORED_BUILDS behavior that was failing builds.
        - npm install -g pnpm@9
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @area-code/web build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'

customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json|webp|avif)$)([^.]+$)/>'
    target: /index.html
    status: '200'
