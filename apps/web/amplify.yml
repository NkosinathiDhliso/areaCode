version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Pin pnpm to v9 to match CI and avoid pnpm 10's stricter
        # ERR_PNPM_IGNORED_BUILDS behavior that was failing builds.
        - npm install -g pnpm@9
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @area-code/web build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

# Custom headers live in customHttp.yml at the repo root. Amplify ignores
# customHeaders in app-level amplify.yml for monorepo apps.

customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|xml|svg|woff|woff2|ttf|map|json|webmanifest|webp|avif)$)([^.]+$)/>'
    target: /index.html
    status: '200'
