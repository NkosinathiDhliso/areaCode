<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Code</title>

    <!-- Theme color for browser chrome / mobile status bar -->
    <meta name="theme-color" content="#0c1018" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0ece6" media="(prefers-color-scheme: light)" />
    <!-- Default (before JS hydrates) -->
    <meta name="theme-color" content="#0c1018" />

    <!-- Font preloading — prevent layout shift -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Mapbox GL CSS loaded via npm package in main.tsx -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
