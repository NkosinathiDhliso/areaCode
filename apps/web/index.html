<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Area Code | Live venue map for South Africa</title>
    <meta
      name="description"
      content="Area Code is a real-time venue discovery platform for South Africa. See which spots are buzzing right now, check in to earn rewards, and find places that match your taste in coffee, food, music, and nightlife."
    />
    <link rel="canonical" href="https://www.areacode.co.za/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA web app manifest. iOS 16.4+ honours `display: standalone` from
         here (in addition to apple-mobile-web-app-capable below); Android /
         Chrome use it for installable, chrome-less launch. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / social previews. Also helps Google's brand-verification
         crawler match the app name on the consent screen with the home page. -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_ZA" />
    <meta property="og:site_name" content="Area Code" />
    <meta property="og:title" content="Area Code" />
    <meta property="og:url" content="https://www.areacode.co.za/" />
    <meta
      property="og:description"
      content="Area Code is a real-time venue discovery platform for South Africa. See which spots are buzzing right now, check in to earn rewards, and find places that match your taste in coffee, food, music, and nightlife."
    />
    <!-- Social share image. Drop a 1200x630 PNG at apps/web/public/og-image.png. -->
    <meta property="og:image" content="https://www.areacode.co.za/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Area Code | live venue map for South Africa" />
    <meta name="application-name" content="Area Code" />
    <meta name="apple-mobile-web-app-title" content="Area Code" />

    <!-- Twitter / X card. Falls back to the og:* tags above for image-less previews. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Area Code" />
    <meta
      name="twitter:description"
      content="A live map of which venues are buzzing right now in Johannesburg, Cape Town, and Durban. Check in, earn rewards."
    />
    <meta name="twitter:image" content="https://www.areacode.co.za/og-image.png" />

    <!-- Geo targeting for South Africa local search. -->
    <meta name="geo.region" content="ZA" />
    <meta name="geo.placename" content="Johannesburg, Cape Town, Durban" />

    <!-- Structured data for search engines and OAuth brand verification. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Area Code",
        "alternateName": ["AreaCode", "Area Code SA", "areacode.co.za"],
        "url": "https://www.areacode.co.za/",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Any",
        "description": "Area Code is a real-time venue discovery and rewards platform for South Africa. Consumers check in at participating venues to earn rewards, climb local leaderboards, and discover spots that match their taste.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "ZAR"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Area Code",
          "alternateName": "AreaCode",
          "url": "https://www.areacode.co.za/",
          "areaServed": ["Johannesburg", "Cape Town", "Durban", "South Africa"]
        },
        "privacyPolicy": "https://www.areacode.co.za/legal/privacy",
        "termsOfService": "https://www.areacode.co.za/legal/terms"
      }
    </script>

    <!-- Google Search Console domain ownership verification (URL prefix property).
         Required for the Google OAuth brand-verification re-submission.
         Do not remove - Search Console re-checks this periodically. -->
    <meta name="google-site-verification" content="YhaNBzoevvHFnN--LIzb8SZ3HyUvBGtCD9zBv16HaJU" />

    <!-- Theme color for browser chrome / mobile status bar -->
    <meta name="theme-color" content="#0c1018" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0ece6" media="(prefers-color-scheme: light)" />
    <!-- Default (before JS hydrates) -->
    <meta name="theme-color" content="#0c1018" />

    <!-- Pre-hydration background. Matches the app's --bg-base per colour scheme
         so the first paint (and any home-indicator safe-area strip before the
         stylesheet loads) is the right theme colour instead of a black flash. -->
    <style>
      html {
        background: #0c1018;
      }
      @media (prefers-color-scheme: light) {
        html {
          background: #f0ece6;
        }
      }
    </style>

    <!-- Font preloading - prevent layout shift -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Mapbox GL CSS loaded via npm package in main.tsx -->
  </head>
  <body>
    <!--
      The JSON-LD, OpenGraph, and meta tags in <head> give crawlers everything
      they need to identify the app. We don't render a visible HTML fallback
      here because it flashes a jarring white-themed placeholder before React
      mounts. AuthLanding (in apps/web/src/screens/AuthLanding.tsx) carries
      the same content for end users.
    -->
    <div id="root" style="min-height: 100dvh">
      <noscript>
        <p style="background: #fffbe6; color: #5b4500; padding: 12px; text-align: center; margin: 0">
          Area Code requires JavaScript. Please enable it in your browser settings to use the app.
        </p>
        <main
          style="
            font-family:
              system-ui,
              -apple-system,
              sans-serif;
            max-width: 640px;
            margin: 0 auto;
            padding: 32px 20px;
            color: #e6e1d6;
          "
        >
          <h1 style="font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 8px">Area Code</h1>
          <p style="color: #a8a397; margin: 0 0 16px; font-size: 16px">
            A real-time venue discovery and rewards app for South Africa.
          </p>
          <p style="font-size: 15px; line-height: 1.5; color: #c9c4b6">
            Area Code is a mobile and web application that lets people in Johannesburg, Cape Town, and Durban see which
            cafes, restaurants, bars, and nightlife venues are alive right now. Each venue shows a live status (quiet,
            active, buzzing, or popping) updated in real time as customers check in.
          </p>
          <p style="margin-top: 24px; font-size: 14px">
            <a href="https://www.areacode.co.za/legal/privacy" style="color: #87a8d3">Privacy Policy</a>
            &middot;
            <a href="https://www.areacode.co.za/legal/terms" style="color: #87a8d3">Terms of Service</a>
            &middot;
            <a href="mailto:support@areacode.co.za" style="color: #87a8d3">support@areacode.co.za</a>
          </p>
        </main>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
