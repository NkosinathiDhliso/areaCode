version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @area-code/staff build
  artifacts:
    baseDirectory: apps/staff/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
