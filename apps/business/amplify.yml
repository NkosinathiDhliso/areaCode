version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @area-code/business build
  artifacts:
    baseDirectory: apps/business/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

customHeaders:
  # Hashed Vite build artifacts - safe to cache forever.
  - pattern: '/assets/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  # HTML entry must never be cached by the browser or CDN edge, otherwise
  # tabs end up referencing chunk hashes from a previous deploy and 404
  # on dynamic imports (LivePanel, useSocketRoom, etc.).
  - pattern: '/index.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '/'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/*'
    headers:
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'

customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json|webp|avif)$)([^.]+$)/>'
    target: /index.html
    status: '200'
