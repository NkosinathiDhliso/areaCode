version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Pin pnpm to v9 to match CI and avoid pnpm 10's stricter
        # ERR_PNPM_IGNORED_BUILDS behavior that was failing builds.
        - npm install -g pnpm@9
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @area-code/business build
  artifacts:
    baseDirectory: apps/business/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
